common:
  reload:
    name: "구성"
    description: "플러그인 구성을 다시 불러옵니다"
rsf:
  name: "프레임워크"
  commands:
    information:
      name: "정보"
      description: "서버의 소프트웨어 정보를 확인합니다"
    item:
      name: "아이템"
      description: "손에 든 아이템이나 ID로 아이템의 정보를 조회합니다"
      usage: "/프레임워크 아이템 [ID]"
proxium:
  name: "프록시움"
  commands:
    actionbar:
      name: "액션바"
      description: "액션바 메세지를 전송합니다"
      usage: "/프록시움 액션바 {유저} [메세지]"
    title:
      name: "타이틀"
      description: "타이틀 메세지를 전송합니다"
      usage: "/프록시움 타이틀 {유저} [타이틀] [서브타이틀]"
    broadcast:
      name: "공지"
      description: "공지 메세지를 전송합니다"
      usage: "/프록시움 공지 [메세지]"
    send:
      name: "전송"
      description: "플레이어에게 메세지를 전송합니다"
      usage: "/프록시움 전송 {플레이어} [메세지]"
    test:
      name: "테스트"
      description: "Proxium 통합 테스트를 실행합니다"
